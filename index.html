<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Penguin | Melodica & Guitar Duo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --accent-color: #ff9f43; /* 暖かなオレンジ */
            --sub-color: #2f3640; /* ペンギンブラック */
        }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0; padding: 0; color: var(--text-color); line-height: 1.8;
        }
        header {
            background: var(--sub-color); color: white;
            padding: 100px 20px; text-align: center;
        }
        .logo { font-size: 2.5rem; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 10px; }
        .subtitle { font-size: 1.1rem; opacity: 0.8; }
        nav {
            background: #f8f9fa; padding: 15px;
            position: sticky; top: 0; text-align: center; border-bottom: 1px solid #eee;
        }
        nav a { margin: 0 15px; text-decoration: none; color: var(--sub-color); font-weight: 500; }
        section { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        h2 { border-bottom: 3px solid var(--accent-color); display: inline-block; margin-bottom: 30px; }
        .video-container {
            position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
            margin-bottom: 30px; background: #eee;
        }
        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
        footer { background: #f8f9fa; text-align: center; padding: 40px; font-size: 0.9rem; }
        .contact-btn {
            display: inline-block; padding: 12px 30px; background: var(--accent-color);
            color: white; text-decoration: none; border-radius: 25px; transition: 0.3s;
        }
        .contact-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

<header>
    <div class="logo">Pocket Penguin</div>
    <div class="subtitle">Melodica & Guitar Duo</div>
</header>

<nav>
    <a href="#about">About</a>
    <a href="#videos">Videos</a>
    <a href="#contact">Contact</a>
</nav>

<section id="about">
    <h2>About</h2>
    <p>メロディカ（鍵盤ハーモニカ）とアコースティックギターによるデュオ、Pocket Penguin（ポケットペンギン）です。</p>
    <p>どこか懐かしく、温かい音色を大切に、日々の生活にそっと寄り添うような音楽を届けています。</p>
</section>

<section id="videos">
    <h2>Videos</h2>
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>
    <p style="text-align:center;">最新の演奏動画を順次公開しています。</p>
</section>

<section id="contact" style="text-align: center;">
    <h2>Contact</h2>
    <p>演奏依頼やお問い合わせはこちらからどうぞ。</p>
    <a href="mailto:your-email@example.com" class="contact-btn">メールを送る</a>
</section>

<footer>
    <p>&copy; 2026 Pocket Penguin</p>
</footer>

</body>
</html>
