<html lang="ja">

        }
        nav { max-width: 1000px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; }

        .section-title { text-align: center; margin-bottom: 40px; }

        .bio-text { margin-bottom: 30px; white-space: pre-wrap; }
